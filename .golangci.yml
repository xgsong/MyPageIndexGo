run:
  timeout: 5m
  tests: true

linters:
  enable:
    - unused          # Check for unused constants, variables, functions and types
    - errcheck        # Check for unchecked errors
    - gosimple        # Suggest simplifications to code
    - govet           # Report suspicious constructs
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Apply staticcheck analyses
    - typecheck       # Like the front-end of a Go compiler

linters-settings:
  unused:
    check-exported: false  # Don't check exported functions for unusedness

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - unused
        - deadcode
